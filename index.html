<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sistema de Gestión Policial - Login</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-shield-alt"></i>
                <h2>Sistema de Gestión Policial</h2>
                <p>Iniciar Sesión</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username"><i class="fas fa-user"></i> Usuario</label>
                    <input type="text" id="username" name="username" class="form-control" 
                           placeholder="Ingrese su usuario" required autocomplete="off">
                </div>
                
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Contraseña</label>
                    <div style="position: relative;">
                        <input type="password" id="password" name="password" class="form-control" 
                               placeholder="Ingrese su contraseña" required>
                        <button type="button" class="btn btn-sm" 
                                style="position: absolute; right: 5px; top: 50%; transform: translateY(-50%);"
                                onclick="togglePasswordVisibility('password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                </button>
            </form>
            
            <div class="text-center mt-3" style="color: var(--text-secondary); font-size: 0.75rem;">
                <p>Usuarios de prueba:</p>
                <p><strong>admin</strong> / admin123 - <em>Acceso total</em></p>
                <p><strong>supervisor.lp</strong> / admin123 - <em>Delegación La Plata</em></p>
                <p><strong>jefe.crim.lp</strong> / admin123 - <em>Sección Criminalística LP</em></p>
            </div>
        </div>
    </div>
    
    <div id="toast-container" class="toast-container"></div>
    
    <script src="main.js"></script>
</body>
</html>
