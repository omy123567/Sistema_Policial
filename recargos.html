<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Recargos - Sistema de Gestión Policial</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; }
        @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } }
        input[list], select { width: 100%; padding: 0.5rem 0.75rem; background-color: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); }
        .filtros-container { background-color: var(--bg-surface); border-radius: 12px; padding: 1rem; margin-bottom: 1.5rem; }
        .filtros-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
        .badge-estado { display: inline-block; padding: 0.25rem 0.5rem; border-radius: 8px; font-size: 0.7rem; font-weight: bold; }
        .badge-pendiente { background-color: rgba(217,119,6,0.2); color:#d97706; }
        .badge-resuelto { background-color: rgba(22,163,74,0.2); color:#16a34a; }
        .badge-rechazado { background-color: rgba(220,38,38,0.2); color:#dc2626; }
        .btn-accion { padding: 0.25rem 0.5rem; margin:0 0.25rem; border-radius:6px; font-size:0.7rem; cursor:pointer; }
        .btn-ver { background-color: rgba(29,78,216,0.2); color:#1d4ed8; border:none; }
        .btn-ver:hover { background-color:#1d4ed8; color:white; }
        .btn-eliminar { background-color: rgba(220,38,38,0.2); color:#dc2626; border:none; }
        .btn-eliminar:hover { background-color:#dc2626; color:white; }
        @media (max-width:768px){ .filtros-grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <div class="header">
        <nav class="navbar">
            <div class="logo"><i class="fas fa-shield-alt"></i><span>Sistema Policial</span></div>
            <div class="hamburger"><span></span><span></span><span></span></div>
            <ul class="nav-menu">
                <li><a href="dashboard.html" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="personal.html" class="nav-link"><i class="fas fa-users"></i> Personal</a></li>
                <li><a href="recargos.html" class="nav-link active"><i class="fas fa-exclamation-triangle"></i> Recargos</a></li>
                <li><a href="expedientes.html" class="nav-link"><i class="fas fa-folder-open"></i> Expedientes</a></li>
                <li><a href="licencias.html" class="nav-link"><i class="fas fa-calendar-alt"></i> Licencias</a></li>
                <li><a href="usuarios.html" class="nav-link"><i class="fas fa-user-cog"></i> Usuarios</a></li>
                <li><a href="configuracion.html" class="nav-link"><i class="fas fa-cog"></i> Configuración</a></li>
            </ul>
            <div class="user-info"><span id="userInfo"></span><button id="logoutBtn" class="btn btn-sm btn-danger"><i class="fas fa-sign-out-alt"></i> Salir</button></div>
        </nav>
    </div>
    
    <div class="container">
        <div class="card-header">
            <h1><i class="fas fa-exclamation-triangle"></i> Gestión de Recargos</h1>
            <div>
                <button id="btnNuevoRecargo" class="btn btn-primary" onclick="openRecargoModal()"><i class="fas fa-plus"></i> Nuevo Recargo</button>
                <button id="btnReportePDF" class="btn btn-secondary" onclick="generarPDFRecargos()"><i class="fas fa-file-pdf"></i> Reporte PDF</button>
            </div>
        </div>
        
        <div class="filtros-container">
            <h3><i class="fas fa-filter"></i> Filtros</h3>
            <div class="filtros-grid">
                <div><label>Fecha Desde</label><input type="date" id="filtro_fecha_desde" class="form-control"></div>
                <div><label>Fecha Hasta</label><input type="date" id="filtro_fecha_hasta" class="form-control"></div>
                <div><label>Tipo</label><select id="filtro_tipo" class="form-control"><option value="">Todos</option></select></div>
                <div><label>Estado</label><select id="filtro_estado" class="form-control"><option value="">Todos</option><option>Pendiente</option><option>Resuelto</option><option>Rechazado</option></select></div>
                <div><label>Personal</label><input type="text" id="filtro_personal" class="form-control" placeholder="Nombre"></div>
                <div id="filtroDependenciaContainer" style="display:none;"><label>Dependencia</label><select id="filtro_dependencia" class="form-control" data-dependencia><option value="">Todas</option></select></div>
            </div>
            <div style="display:flex;gap:0.5rem;margin-top:1rem;">
                <button class="btn btn-primary" onclick="aplicarFiltros()"><i class="fas fa-search"></i> Buscar</button>
                <button class="btn btn-secondary" onclick="limpiarFiltros()"><i class="fas fa-eraser"></i> Limpiar</button>
                <button class="btn btn-secondary" onclick="exportarFiltradosCSV()"><i class="fas fa-file-csv"></i> Exportar CSV</button>
            </div>
        </div>
        
        <div class="table-container">
            <table id="recargosTable">
                <thead><tr><th>Fecha</th><th>Hora</th><th>Tipo</th><th>Oficina</th><th>Personal</th><th>Estado</th><th>Acciones</th></tr></thead>
                <tbody id="recargosTableBody"><tr><td colspan="7" class="text-center">Cargando...<\/td></tr></tbody>
            </table>
        </div>
    </div>
    
    <div id="recargoModal" class="modal"><div class="modal-content" style="max-width:600px;">
        <div class="modal-header"><h3 id="modalTitle">Nuevo Recargo</h3><span class="close-modal">&times;</span></div>
        <div class="modal-body">
            <form id="recargoForm">
                <input type="hidden" id="recargoId"><input type="hidden" id="recargo_tipo"><input type="hidden" id="recargo_oficina"><input type="hidden" id="recargo_personal"><input type="hidden" id="recargo_dependencia">
                <div class="form-row"><div><label>Fecha *</label><input type="date" id="recargo_fecha" class="form-control" required></div><div><label>Hora *</label><input type="time" id="recargo_hora" class="form-control" required></div></div>
                <div><label>Tipo *</label><input type="text" id="recargo_tipo_input" class="form-control" list="tiposRecargoList" placeholder="Buscar..." autocomplete="off" required><datalist id="tiposRecargoList"></datalist></div>
                <div><label>Oficina *</label><input type="text" id="recargo_oficina_input" class="form-control" list="oficinasList" placeholder="Buscar..." autocomplete="off" required><datalist id="oficinasList"></datalist></div>
                <div><label>Personal *</label><input type="text" id="recargo_personal_input" class="form-control" list="personalList" placeholder="Buscar..." autocomplete="off" required><datalist id="personalList"></datalist></div>
                <div><label>Dependencia</label><select id="recargo_dependencia_select" class="form-control" data-dependencia><option value="">Seleccionar</option></select></div>
                <div><label>Estado</label><select id="recargo_estado" class="form-control"><option>Pendiente</option><option>Resuelto</option><option>Rechazado</option></select></div>
                <div><label>Observaciones</label><textarea id="recargo_observaciones" class="form-control" rows="3"></textarea></div>
            </form>
        </div>
        <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveRecargo()">Guardar</button></div>
    </div></div>
    
    <div id="toast-container" class="toast-container"></div>
    <datalist id="tiposRecargoList"></datalist><datalist id="oficinasList"></datalist><datalist id="personalList"></datalist>
    <script src="main.js"></script>
    <script>
        let datosOriginales=[],datosFiltrados=[];
        function getEstadoBadge(e){const c={'Pendiente':'badge-pendiente','Resuelto':'badge-resuelto','Rechazado':'badge-rechazado'},i={'Pendiente':'fa-hourglass-half','Resuelto':'fa-check-circle','Rechazado':'fa-times-circle'};return `<span class="badge-estado ${c[e]||'badge-pendiente'}"><i class="fas ${i[e]||'fa-hourglass-half'}"></i> ${e||'Pendiente'}</span>`;}
        function renderRecargosTable(d){const t=document.getElementById('recargosTableBody');if(!t)return;if(!d||d.length===0){t.innerHTML='<tr><td colspan="7" class="text-center">No hay registros</td></tr>';return;}const puedeEditar=window.canEdit&&window.canEdit('recargos'),puedeEliminar=window.canDelete&&window.canDelete('recargos');t.innerHTML=d.map(i=>`<tr><td>${escapeHtml(i.fecha)}</td><td>${escapeHtml(i.hora)}</td><td>${escapeHtml(i.tipo_recargo||'-')}</td><td>${escapeHtml(i.oficina||'-')}</td><td>${escapeHtml(i.apellido?`${i.apellido}, ${i.nombre}`:'-')}</td><td>${getEstadoBadge(i.estado)}</td><td>${puedeEditar?`<button class="btn-accion btn-ver" onclick="editRecargo(${i.id})"><i class="fas fa-edit"></i></button>`:''}${puedeEliminar?`<button class="btn-accion btn-eliminar" onclick="deleteRecargo(${i.id})"><i class="fas fa-trash"></i></button>`:''}</td></tr>`).join('');}
        async function cargarTiposSelect(){try{const t=await apiRequest('catalogos&tipo=tipos_recargo');const s=document.getElementById('filtro_tipo');if(s&&t)s.innerHTML='<option value="">Todos</option>'+t.map(t=>`<option value="${t.valor}">${t.valor}</option>`).join('');}catch(e){}}
        function aplicarFiltros(){let f=[...datosOriginales];const fd=document.getElementById('filtro_fecha_desde')?.value;if(fd)f=f.filter(r=>r.fecha>=fd);const fh=document.getElementById('filtro_fecha_hasta')?.value;if(fh)f=f.filter(r=>r.fecha<=fh);const t=document.getElementById('filtro_tipo')?.value;if(t&&t!=='')f=f.filter(r=>r.tipo_recargo===t);const e=document.getElementById('filtro_estado')?.value;if(e&&e!=='')f=f.filter(r=>r.estado===e);const p=document.getElementById('filtro_personal')?.value.trim().toLowerCase();if(p)f=f.filter(r=>(r.apellido||'').toLowerCase().includes(p)||(r.nombre||'').toLowerCase().includes(p));const d=document.getElementById('filtro_dependencia')?.value;if(d)f=f.filter(r=>r.dependencia_id==d);datosFiltrados=f;renderRecargosTable(f);showToast(`Encontrados ${f.length} recargos`,f.length>0?'success':'warning');}
        function limpiarFiltros(){['filtro_fecha_desde','filtro_fecha_hasta','filtro_tipo','filtro_estado','filtro_personal','filtro_dependencia'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});renderRecargosTable(datosOriginales);datosFiltrados=[...datosOriginales];showToast('Filtros limpiados','info');}
        function exportarFiltradosCSV(){const d=datosFiltrados.length>0?datosFiltrados:datosOriginales;if(!d||d.length===0){showToast('No hay datos','warning');return;}const headers=['Fecha','Hora','Tipo','Oficina','Personal','Estado','Observaciones'];const csv=[headers.join(',')];d.forEach(i=>{csv.push([`"${i.fecha||''}"`,`"${i.hora||''}"`,`"${i.tipo_recargo||''}"`,`"${i.oficina||''}"`,`"${i.apellido?`${i.apellido}, ${i.nombre}`:''}"`,`"${i.estado||'Pendiente'}"`,`"${(i.observaciones||'').substring(0,100)}"`].join(','));});const blob=new Blob([csv.join('\n')],{type:'text/csv'});const link=document.createElement('a');link.href=URL.createObjectURL(blob);link.download=`recargos_${new Date().toISOString().split('T')[0]}.csv`;link.click();URL.revokeObjectURL(link.href);showToast('Exportación completada','success');}
        async function generarPDFRecargos(){const t=document.getElementById('recargosTable');if(!t){showToast('No hay datos','warning');return;}showToast('Generando PDF...','info');try{const{jsPDF}=window.jspdf;const pdf=new jsPDF('landscape','mm','a4');pdf.setFontSize(18);pdf.text('Reporte de Recargos',14,20);pdf.setFontSize(10);pdf.text(`Fecha: ${new Date().toLocaleString()}`,14,30);const canvas=await html2canvas(t,{scale:2,backgroundColor:'#1c2128'});const imgData=canvas.toDataURL('image/png');const pdfWidth=pdf.internal.pageSize.getWidth()-20;const pdfHeight=(canvas.height*pdfWidth)/canvas.width;pdf.addImage(imgData,'PNG',10,40,pdfWidth,pdfHeight);pdf.save(`reporte_recargos_${new Date().toISOString().split('T')[0]}.pdf`);showToast('PDF generado','success');}catch(e){showToast('Error','error');}}
        const originalLoadRecargos=window.loadRecargos;window.loadRecargos=async function(){try{const data=await apiRequest('recargos');datosOriginales=data;datosFiltrados=[...data];renderRecargosTable(data);await cargarTiposSelect();showToast('Recargos cargados','success');}catch(e){showToast('Error','error');}};
        window.generarPDFRecargos=generarPDFRecargos;window.aplicarFiltros=aplicarFiltros;window.limpiarFiltros=limpiarFiltros;window.exportarFiltradosCSV=exportarFiltradosCSV;
    </script>
</body>
</html>
