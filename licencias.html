<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Licencias - Sistema de Gestión Policial</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; }
        @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } }
        .filtros-container { background-color: var(--bg-surface); border-radius: 12px; padding: 1rem; margin-bottom: 1.5rem; }
        .filtros-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
        .btn-accion { padding: 0.25rem 0.5rem; margin: 0 0.25rem; border-radius: 6px; font-size: 0.7rem; cursor: pointer; border: none; }
        .btn-editar { background-color: rgba(29,78,216,0.2); color:#1d4ed8; }
        .btn-editar:hover { background-color:#1d4ed8; color:white; }
        .btn-eliminar { background-color: rgba(220,38,38,0.2); color:#dc2626; }
        .btn-eliminar:hover { background-color:#dc2626; color:white; }
        .badge-estado { display: inline-block; padding: 0.25rem 0.5rem; border-radius: 8px; font-size: 0.7rem; font-weight: bold; }
        .badge-aprobada { background-color: rgba(22,163,74,0.2); color:#16a34a; }
        .badge-pendiente { background-color: rgba(217,119,6,0.2); color:#d97706; }
        .badge-rechazada { background-color: rgba(220,38,38,0.2); color:#dc2626; }
        .badge-finalizada { background-color: rgba(107,114,128,0.2); color:#9ca3af; }
        .badge-curso { background-color: rgba(29,78,216,0.2); color:#1d4ed8; }
        .config-columnas { background: var(--bg-surface); border-radius: 12px; padding: 1rem; margin-bottom: 1.5rem; border: 1px solid var(--border); }
        .config-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 0.5rem; margin-top: 1rem; }
        .config-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem; border-radius: 8px; cursor: pointer; }
        .config-item:hover { background: var(--bg-card); }
        .btn-config { background: var(--bg-surface); border: 1px solid var(--border); color: var(--text-primary); padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; }
        th.draggable { cursor: move; user-select: none; }
        th .drag-handle { display: inline-block; margin-right: 5px; opacity: 0.5; cursor: move; }
        th:hover .drag-handle { opacity: 1; }
        th.drag-over { background-color: var(--accent-primary); color: white; }
        .column-order-list { background: var(--bg-surface); border-radius: 8px; padding: 0.5rem; max-height: 300px; overflow-y: auto; }
        .column-order-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem; margin: 0.25rem 0; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; cursor: move; }
        .column-order-item:hover { background: var(--bg-surface); border-color: var(--accent-primary); }
        .column-order-item .drag-icon { color: var(--text-secondary); cursor: grab; }
        .column-order-item .col-name { flex: 1; }
        input[list] { width: 100%; padding: 0.5rem 0.75rem; background-color: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); }
        @media (max-width:768px){ .filtros-grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <div class="header">
        <nav class="navbar">
            <div class="logo"><i class="fas fa-shield-alt"></i><span>Sistema Policial</span></div>
            <div class="hamburger"><span></span><span></span><span></span></div>
            <ul class="nav-menu">
                <li><a href="dashboard.html" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="personal.html" class="nav-link"><i class="fas fa-users"></i> Personal</a></li>
                <li><a href="recargos.html" class="nav-link"><i class="fas fa-exclamation-triangle"></i> Recargos</a></li>
                <li><a href="expedientes.html" class="nav-link"><i class="fas fa-folder-open"></i> Expedientes</a></li>
                <li><a href="licencias.html" class="nav-link active"><i class="fas fa-calendar-alt"></i> Licencias</a></li>
                <li><a href="usuarios.html" class="nav-link"><i class="fas fa-user-cog"></i> Usuarios</a></li>
                <li><a href="configuracion.html" class="nav-link"><i class="fas fa-cog"></i> Configuración</a></li>
            </ul>
            <div class="user-info"><span id="userInfo"></span><button id="logoutBtn" class="btn btn-sm btn-danger"><i class="fas fa-sign-out-alt"></i> Salir</button></div>
        </nav>
    </div>
    
    <div class="container">
        <div class="card-header">
            <h1><i class="fas fa-calendar-alt"></i> Gestión de Licencias</h1>
            <div>
                <button id="btnConfigurarColumnas" class="btn-config"><i class="fas fa-columns"></i> Personalizar</button>
                <button id="btnNuevaLicencia" class="btn btn-primary" onclick="openLicenciaModal()"><i class="fas fa-plus"></i> Nueva</button>
                <button class="btn btn-secondary" onclick="exportarCSV()"><i class="fas fa-file-csv"></i> CSV</button>
            </div>
        </div>
        
        <div id="configPanel" class="config-columnas" style="display: none;">
            <h3>Personalizar Columnas</h3>
            <p class="text-secondary">Arrastre para reordenar. Marque/desmarque para mostrar/ocultar.</p>
            <div id="columnOrderList" class="column-order-list"></div>
            <div class="mt-2">
                <button id="btnResetColumns" class="btn btn-secondary btn-sm">Restablecer</button>
                <button id="btnGuardarConfig" class="btn btn-primary">Guardar</button>
                <button id="btnCerrarConfig" class="btn btn-secondary">Cancelar</button>
            </div>
        </div>
        
        <div class="filtros-container">
            <h3>Filtros</h3>
            <div class="filtros-grid">
                <div><label>Fecha Desde</label><input type="date" id="filtro_fecha_desde" class="form-control"></div>
                <div><label>Fecha Hasta</label><input type="date" id="filtro_fecha_hasta" class="form-control"></div>
                <div><label>Tipo</label><select id="filtro_tipo" class="form-control"><option value="">Todos</option></select></div>
                <div><label>Estado</label><select id="filtro_estado" class="form-control"><option value="">Todos</option><option>Pendiente</option><option>Aprobada</option><option>Rechazada</option><option>En Curso</option><option>Finalizada</option></select></div>
                <div><label>Agente</label><input type="text" id="filtro_agente" class="form-control" placeholder="Nombre"></div>
            </div>
            <div style="display:flex;gap:0.5rem;margin-top:1rem;">
                <button class="btn btn-primary" onclick="aplicarFiltros()">Buscar</button>
                <button class="btn btn-secondary" onclick="limpiarFiltros()">Limpiar</button>
            </div>
        </div>
        
        <div class="table-container">
            <table id="licenciasTable">
                <thead id="tableHeader"></thead>
                <tbody id="licenciasTableBody"><tr><td colspan="10" class="text-center">Cargando...<\/td></tr></tbody>
            </table>
        </div>
    </div>
    
    <div id="licenciaModal" class="modal"><div class="modal-content" style="max-width:600px;">
        <div class="modal-header"><h3 id="modalTitle">Nueva Licencia</h3><span class="close-modal">&times;</span></div>
        <div class="modal-body">
            <form id="licenciaForm">
                <input type="hidden" id="licenciaId">
                <div><label>Agente *</label>
                    <select id="licencia_agente_id" class="form-control" required>
                        <option value="">Seleccionar agente...</option>
                    </select>
                </div>
                <div><label>Tipo *</label>
                    <input type="text" id="licencia_tipo" class="form-control" list="tiposLicenciaList" placeholder="Buscar..." autocomplete="off" required>
                    <datalist id="tiposLicenciaList"></datalist>
                </div>
                <div><label>Estado</label>
                    <select id="licencia_estado" class="form-control">
                        <option>Pendiente</option><option>Aprobada</option><option>Rechazada</option><option>En Curso</option><option>Finalizada</option>
                    </select>
                </div>
                <div class="form-row">
                    <div><label>Fecha Inicio *</label><input type="date" id="licencia_fecha_inicio" class="form-control" required></div>
                    <div><label>Días Hábiles</label><input type="number" id="licencia_dias_habiles" class="form-control" value="0" min="0"></div>
                </div>
                <div class="form-row">
                    <div><label>Días Viaje</label><input type="number" id="licencia_dias_viaje" class="form-control" value="0" min="0"></div>
                    <div><label><input type="checkbox" id="licencia_contar_fines_semana"> Contar fines de semana</label></div>
                </div>
                <div><label>Fecha Fin</label><input type="date" id="licencia_fecha_fin" class="form-control" readonly></div>
                <div><label>Observaciones</label><textarea id="licencia_observaciones" class="form-control" rows="3"></textarea></div>
            </form>
        </div>
        <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveLicencia()">Guardar</button></div>
    </div></div>
    
    <div id="toast-container" class="toast-container"></div>
    
    <script>
        const API_URL = 'backend/api.php';
        let licenciasData = [];
        let activeColumns = ['legajo', 'apellido_nombre', 'tipo_licencia', 'estado', 'fecha_inicio', 'fecha_fin', 'dias_habiles'];
        
        const columnLabels = {
            'legajo': 'Legajo', 'apellido_nombre': 'Agente', 'tipo_licencia': 'Tipo',
            'estado': 'Estado', 'fecha_inicio': 'Inicio', 'fecha_fin': 'Fin', 'dias_habiles': 'Días', 'observaciones': 'Observaciones'
        };
        
        const allColumns = ['legajo', 'apellido_nombre', 'tipo_licencia', 'estado', 'fecha_inicio', 'fecha_fin', 'dias_habiles', 'observaciones'];
        
        function getToken() { return localStorage.getItem('jwt_token'); }
        
        function showToast(msg, type) {
            let c = document.getElementById('toast-container');
            if (!c) { c = document.createElement('div'); c.id = 'toast-container'; c.className = 'toast-container'; document.body.appendChild(c); }
            const t = document.createElement('div'); t.className = `toast toast-${type}`; t.innerHTML = `<div>${msg}</div>`;
            c.appendChild(t); setTimeout(() => t.remove(), 3000);
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function getEstadoClass(estado) {
            const clases = { 'Aprobada': 'badge-aprobada', 'Pendiente': 'badge-pendiente', 'Rechazada': 'badge-rechazada', 'Finalizada': 'badge-finalizada', 'En Curso': 'badge-curso' };
            return `<span class="badge-estado ${clases[estado] || 'badge-pendiente'}">${estado || 'Pendiente'}</span>`;
        }
        
        function calcularFechaFin() {
            const fi = document.getElementById('licencia_fecha_inicio')?.value;
            const dh = parseInt(document.getElementById('licencia_dias_habiles')?.value) || 0;
            const dv = parseInt(document.getElementById('licencia_dias_viaje')?.value) || 0;
            const cf = document.getElementById('licencia_contar_fines_semana')?.checked;
            if (!fi) return;
            let fecha = new Date(fi);
            let total = dh + dv;
            if (!cf) { let agregados = 0; while (agregados < total) { fecha.setDate(fecha.getDate() + 1); if (fecha.getDay() !== 0 && fecha.getDay() !== 6) agregados++; } }
            else { fecha.setDate(fecha.getDate() + total); }
            document.getElementById('licencia_fecha_fin').value = fecha.toISOString().split('T')[0];
        }
        
        function renderTable() {
            const thead = document.getElementById('tableHeader');
            const tbody = document.getElementById('licenciasTableBody');
            if (!thead || !tbody) return;
            
            thead.innerHTML = '<tr>' + activeColumns.map(col => `<th class="draggable" data-col="${col}" draggable="true"><span class="drag-handle"><i class="fas fa-grip-vertical"></i></span> ${columnLabels[col] || col}</th>`).join('') + '<th>Acciones</th><\/thead>';
            initHeaderDragDrop();
            
            if (!licenciasData || licenciasData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="' + (activeColumns.length + 1) + '" class="text-center">No hay registros<\/tr>';
                return;
            }
            
            tbody.innerHTML = licenciasData.map(item => {
                let row = '<tr>';
                for (const col of activeColumns) {
                    if (col === 'apellido_nombre') row += `<td>${escapeHtml(item.apellido ? `${item.apellido}, ${item.nombre}` : '-')}<\/td>`;
                    else if (col === 'estado') row += `<td>${getEstadoClass(item.estado)}<\/td>`;
                    else if (col === 'legajo') row += `<td>${escapeHtml(item.legajo || '-')}<\/td>`;
                    else row += `<td>${escapeHtml(item[col] || '-')}<\/td>`;
                }
                row += `<td>
                    <button class="btn-accion btn-editar" onclick="editLicencia(${item.id})"><i class="fas fa-edit"></i> Editar</button>
                    <button class="btn-accion btn-eliminar" onclick="deleteLicencia(${item.id})"><i class="fas fa-trash"></i> Eliminar</button>
                <\/td><\/tr>`;
                return row;
            }).join('');
        }
        
        function initHeaderDragDrop() {
            const headers = document.querySelectorAll('#tableHeader th.draggable');
            let dragSrc = null;
            headers.forEach(header => {
                header.addEventListener('dragstart', (e) => { dragSrc = header; e.dataTransfer.setData('text/plain', header.getAttribute('data-col')); header.style.opacity = '0.5'; });
                header.addEventListener('dragend', (e) => { if (dragSrc) dragSrc.style.opacity = ''; dragSrc = null; headers.forEach(h => h.classList.remove('drag-over')); });
                header.addEventListener('dragover', (e) => { e.preventDefault(); header.classList.add('drag-over'); });
                header.addEventListener('dragleave', (e) => { header.classList.remove('drag-over'); });
                header.addEventListener('drop', (e) => {
                    e.preventDefault(); header.classList.remove('drag-over');
                    const fromCol = e.dataTransfer.getData('text/plain');
                    const toCol = header.getAttribute('data-col');
                    if (fromCol !== toCol) {
                        const fromIndex = activeColumns.indexOf(fromCol);
                        const toIndex = activeColumns.indexOf(toCol);
                        if (fromIndex !== -1 && toIndex !== -1) {
                            const moved = activeColumns.splice(fromIndex, 1)[0];
                            activeColumns.splice(toIndex, 0, moved);
                            renderTable(); saveColumnOrder();
                        }
                    }
                });
            });
        }
        
        async function saveColumnOrder() {
            try { const token = getToken(); await fetch(`${API_URL}?endpoint=table_config&tabla=licencias`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ columnas: activeColumns }) }); } catch(e) { console.error(e); }
        }
        
        async function loadCatalogos() {
            try {
                const token = getToken();
                if (!token) return;
                const tiposResp = await fetch(`${API_URL}?endpoint=catalogos&tipo=tipos_licencia`, { headers: { 'Authorization': `Bearer ${token}` } });
                const tipos = await tiposResp.json();
                const tiposList = document.getElementById('tiposLicenciaList');
                if (tiposList && Array.isArray(tipos)) tiposList.innerHTML = tipos.map(t => `<option value="${escapeHtml(t.valor)}">`).join('');
                const filtroTipo = document.getElementById('filtro_tipo');
                if (filtroTipo && Array.isArray(tipos)) filtroTipo.innerHTML = '<option value="">Todos</option>' + tipos.map(t => `<option value="${escapeHtml(t.valor)}">${escapeHtml(t.valor)}</option>`).join('');
            } catch(e) { console.error(e); }
        }
        
        async function loadPersonalSelect() {
            try {
                const token = getToken();
                if (!token) return;
                const response = await fetch(`${API_URL}?endpoint=personal`, { headers: { 'Authorization': `Bearer ${token}` } });
                const personal = await response.json();
                const select = document.getElementById('licencia_agente_id');
                if (select && Array.isArray(personal)) { select.innerHTML = '<option value="">Seleccionar agente...</option>' + personal.map(p => `<option value="${p.id}">${escapeHtml(p.legajo)} - ${escapeHtml(p.apellido)}, ${escapeHtml(p.nombre)}</option>`).join(''); }
            } catch(e) { console.error(e); }
        }
        
        async function loadLicencias() {
            const tbody = document.getElementById('licenciasTableBody');
            if (tbody) tbody.innerHTML = '<tr><td colspan="10" class="text-center">Cargando...<\/td><\/tr>';
            try {
                const token = getToken();
                if (!token) { window.location.href = 'index.html'; return; }
                const response = await fetch(`${API_URL}?endpoint=licencias`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await response.json();
                console.log('Licencias cargadas:', data);
                if (Array.isArray(data)) { licenciasData = data; renderTable(); showToast(`✅ ${data.length} licencias cargadas`, 'success'); }
                else { licenciasData = []; renderTable(); showToast('No hay datos', 'warning'); }
            } catch(e) { renderTable(); showToast('Error cargando', 'error'); }
        }
        
        function openLicenciaModal(data = null) {
            const modal = document.getElementById('licenciaModal');
            if (data) {
                document.getElementById('licenciaId').value = data.id;
                document.getElementById('licencia_agente_id').value = data.agente_id || '';
                document.getElementById('licencia_tipo').value = data.tipo_licencia || '';
                document.getElementById('licencia_estado').value = data.estado || 'Pendiente';
                document.getElementById('licencia_fecha_inicio').value = data.fecha_inicio;
                document.getElementById('licencia_dias_habiles').value = data.dias_habiles;
                document.getElementById('licencia_dias_viaje').value = data.dias_viaje;
                document.getElementById('licencia_contar_fines_semana').checked = data.contar_fines_semana == 1;
                document.getElementById('licencia_fecha_fin').value = data.fecha_fin;
                document.getElementById('licencia_observaciones').value = data.observaciones || '';
                document.getElementById('modalTitle').textContent = 'Editar Licencia';
            } else {
                document.getElementById('licenciaForm').reset();
                document.getElementById('licenciaId').value = '';
                document.getElementById('licencia_fecha_inicio').value = new Date().toISOString().split('T')[0];
                document.getElementById('licencia_estado').value = 'Pendiente';
                document.getElementById('modalTitle').textContent = 'Nueva Licencia';
                calcularFechaFin();
            }
            modal.style.display = 'flex';
        }
        
        async function saveLicencia() {
            const id = document.getElementById('licenciaId').value;
            const data = {
                agente_id: document.getElementById('licencia_agente_id').value,
                tipo_licencia: document.getElementById('licencia_tipo').value,
                estado: document.getElementById('licencia_estado').value,
                fecha_inicio: document.getElementById('licencia_fecha_inicio').value,
                dias_habiles: parseInt(document.getElementById('licencia_dias_habiles').value) || 0,
                dias_viaje: parseInt(document.getElementById('licencia_dias_viaje').value) || 0,
                contar_fines_semana: document.getElementById('licencia_contar_fines_semana').checked ? 1 : 0,
                fecha_fin: document.getElementById('licencia_fecha_fin').value,
                observaciones: document.getElementById('licencia_observaciones').value
            };
            if (!data.agente_id || !data.tipo_licencia || !data.fecha_inicio) { showToast('Complete campos requeridos', 'warning'); return; }
            try {
                const token = getToken();
                const url = id ? `${API_URL}?endpoint=licencias&id=${id}` : `${API_URL}?endpoint=licencias`;
                const method = id ? 'PUT' : 'POST';
                const response = await fetch(url, { method: method, headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(data) });
                const result = await response.json();
                if (result.success) { showToast(`Licencia ${id ? 'actualizada' : 'creada'} correctamente`, 'success'); closeModal(); loadLicencias(); }
                else showToast('Error al guardar', 'error');
            } catch(e) { showToast('Error de conexión', 'error'); }
        }
        
        async function editLicencia(id) {
            try {
                const token = getToken();
                const response = await fetch(`${API_URL}?endpoint=licencias&id=${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await response.json();
                if (data && data.id) openLicenciaModal(data);
                else showToast('No se encontraron datos', 'error');
            } catch(e) { showToast('Error cargando datos', 'error'); }
        }
        
        async function deleteLicencia(id) {
            if (confirm('¿Eliminar esta licencia?')) {
                try { const token = getToken(); await fetch(`${API_URL}?endpoint=licencias&id=${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } }); showToast('Eliminada', 'success'); loadLicencias(); }
                catch(e) { showToast('Error', 'error'); }
            }
        }
        
        function openConfigModal() { document.getElementById('configPanel').style.display = 'block'; renderOrderList(); }
        
        function renderOrderList() {
            const container = document.getElementById('columnOrderList');
            if (!container) return;
            container.innerHTML = '';
            const orderedColumns = [...activeColumns];
            allColumns.forEach(col => { if (!orderedColumns.includes(col)) orderedColumns.push(col); });
            orderedColumns.forEach(col => {
                const isVisible = activeColumns.includes(col);
                const item = document.createElement('div');
                item.className = 'column-order-item';
                item.setAttribute('data-col', col);
                item.setAttribute('draggable', 'true');
                item.innerHTML = `<i class="fas fa-grip-vertical drag-icon"></i><span class="col-name">${columnLabels[col] || col}</span><input type="checkbox" class="col-toggle" ${isVisible ? 'checked' : ''}>`;
                item.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text/plain', col); item.classList.add('dragging'); });
                item.addEventListener('dragend', (e) => { item.classList.remove('dragging'); });
                item.addEventListener('dragover', (e) => { e.preventDefault(); });
                item.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const fromCol = e.dataTransfer.getData('text/plain');
                    const toCol = col;
                    if (fromCol !== toCol) {
                        const fromIndex = orderedColumns.indexOf(fromCol);
                        const toIndex = orderedColumns.indexOf(toCol);
                        if (fromIndex !== -1 && toIndex !== -1) {
                            const moved = orderedColumns.splice(fromIndex, 1)[0];
                            orderedColumns.splice(toIndex, 0, moved);
                            activeColumns = orderedColumns.filter(c => activeColumns.includes(c));
                            renderOrderList();
                        }
                    }
                });
                const checkbox = item.querySelector('.col-toggle');
                checkbox.addEventListener('change', (e) => {
                    if (e.target.checked) { if (!activeColumns.includes(col)) activeColumns.push(col); }
                    else { const idx = activeColumns.indexOf(col); if (idx !== -1) activeColumns.splice(idx, 1); }
                    renderOrderList();
                });
                container.appendChild(item);
            });
        }
        
        async function loadColumnConfig() {
            try {
                const token = getToken();
                const response = await fetch(`${API_URL}?endpoint=table_config&tabla=licencias`, { headers: { 'Authorization': `Bearer ${token}` } });
                const config = await response.json();
                if (config && Array.isArray(config) && config.length > 0) activeColumns = config;
                renderOrderList();
            } catch(e) { console.error(e); }
        }
        
        async function saveColumnConfig() {
            try {
                const token = getToken();
                await fetch(`${API_URL}?endpoint=table_config&tabla=licencias`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ columnas: activeColumns }) });
                showToast('Configuración guardada', 'success');
                document.getElementById('configPanel').style.display = 'none';
                renderTable();
            } catch(e) { showToast('Error', 'error'); }
        }
        
        function resetColumns() { activeColumns = ['legajo', 'apellido_nombre', 'tipo_licencia', 'estado', 'fecha_inicio', 'fecha_fin', 'dias_habiles']; renderOrderList(); renderTable(); }
        
        function aplicarFiltros() {
            let filtrados = [...licenciasData];
            const fd = document.getElementById('filtro_fecha_desde')?.value; if (fd) filtrados = filtrados.filter(l => l.fecha_inicio >= fd);
            const fh = document.getElementById('filtro_fecha_hasta')?.value; if (fh) filtrados = filtrados.filter(l => l.fecha_inicio <= fh);
            const tipo = document.getElementById('filtro_tipo')?.value; if (tipo && tipo !== '') filtrados = filtrados.filter(l => l.tipo_licencia === tipo);
            const estado = document.getElementById('filtro_estado')?.value; if (estado && estado !== '') filtrados = filtrados.filter(l => l.estado === estado);
            const agente = document.getElementById('filtro_agente')?.value.toLowerCase(); if (agente) filtrados = filtrados.filter(l => (l.apellido || '').toLowerCase().includes(agente) || (l.nombre || '').toLowerCase().includes(agente));
            licenciasData = filtrados; renderTable();
            showToast(`Encontradas ${filtrados.length} licencias`, 'info');
        }
        
        function limpiarFiltros() {
            document.getElementById('filtro_fecha_desde').value = ''; document.getElementById('filtro_fecha_hasta').value = '';
            document.getElementById('filtro_tipo').value = ''; document.getElementById('filtro_estado').value = '';
            document.getElementById('filtro_agente').value = ''; loadLicencias();
        }
        
        function exportarCSV() {
            if (!licenciasData.length) { showToast('No hay datos', 'warning'); return; }
            const headers = activeColumns.map(c => columnLabels[c] || c);
            const csv = [headers.join(',')];
            licenciasData.forEach(item => { csv.push(activeColumns.map(col => `"${item[col] || ''}"`).join(',')); });
            const blob = new Blob([csv.join('\n')], { type: 'text/csv' });
            const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = `licencias_${new Date().toISOString().split('T')[0]}.csv`; link.click();
            showToast('Exportación completada', 'success');
        }
        
        function closeModal() { document.getElementById('licenciaModal').style.display = 'none'; }
        
        function checkAuth() {
            const user = localStorage.getItem('current_user');
            if (!user) { window.location.href = 'index.html'; return false; }
            const userData = JSON.parse(user);
            document.getElementById('userInfo').innerHTML = `<span>${escapeHtml(userData.nombre)}</span><span class="badge badge-info">${escapeHtml(userData.rol)}</span>`;
            return true;
        }
        
        document.getElementById('btnConfigurarColumnas')?.addEventListener('click', () => { openConfigModal(); loadColumnConfig(); });
        document.getElementById('btnCerrarConfig')?.addEventListener('click', () => { document.getElementById('configPanel').style.display = 'none'; });
        document.getElementById('btnGuardarConfig')?.addEventListener('click', saveColumnConfig);
        document.getElementById('btnResetColumns')?.addEventListener('click', resetColumns);
        document.getElementById('logoutBtn')?.addEventListener('click', () => { localStorage.clear(); window.location.href = 'index.html'; });
        document.querySelector('.hamburger')?.addEventListener('click', () => { document.querySelector('.nav-menu')?.classList.toggle('active'); });
        document.querySelectorAll('.close-modal').forEach(btn => btn.addEventListener('click', closeModal));
        
        document.getElementById('licencia_fecha_inicio')?.addEventListener('change', calcularFechaFin);
        document.getElementById('licencia_dias_habiles')?.addEventListener('input', calcularFechaFin);
        document.getElementById('licencia_dias_viaje')?.addEventListener('input', calcularFechaFin);
        document.getElementById('licencia_contar_fines_semana')?.addEventListener('change', calcularFechaFin);
        
        document.addEventListener('DOMContentLoaded', () => { if (checkAuth()) { loadCatalogos(); loadPersonalSelect(); loadLicencias(); } });
        
        window.openLicenciaModal = openLicenciaModal; window.saveLicencia = saveLicencia;
        window.editLicencia = editLicencia; window.deleteLicencia = deleteLicencia;
        window.closeModal = closeModal; window.aplicarFiltros = aplicarFiltros;
        window.limpiarFiltros = limpiarFiltros; window.exportarCSV = exportarCSV;
        window.calcularFechaFin = calcularFechaFin;
    </script>
        <script src="theme.js"></script>
</body>
</html>
