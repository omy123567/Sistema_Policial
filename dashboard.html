<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Dashboard - Sistema de Gestión Policial</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .widget {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }
        .widget:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .widget-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }
        .widget-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
        }
        .widget-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent-primary);
        }
        .widget-remove {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .widget-remove:hover {
            color: var(--accent-danger);
        }
        .config-panel {
            background-color: var(--bg-surface);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
        }
        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 0.5rem;
            margin-top: 1rem;
        }
        .config-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .config-item:hover {
            background-color: var(--bg-card);
        }
        .config-item input {
            cursor: pointer;
        }
        .config-item label {
            cursor: pointer;
            flex: 1;
        }
        .periodo-selector {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }
        .kpi-success { color: #16a34a; }
        .kpi-warning { color: #d97706; }
        .kpi-danger { color: #dc2626; }
        .kpi-info { color: #1d4ed8; }
        .bar-chart { margin-top: 1rem; }
        .bar-item { margin-bottom: 0.75rem; }
        .bar-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.25rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .bar {
            background-color: var(--bg-surface);
            border-radius: 8px;
            overflow: hidden;
        }
        .bar-fill {
            background-color: var(--accent-primary);
            height: 28px;
            border-radius: 8px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            color: white;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .list-item {
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
        }
        .list-item:last-child { border-bottom: none; }
        .progress-bar {
            background-color: var(--bg-surface);
            border-radius: 10px;
            overflow: hidden;
            height: 20px;
            margin-top: 0.5rem;
        }
        .progress-fill {
            height: 100%;
            background-color: var(--accent-success);
            transition: width 0.5s;
        }
        .cumple-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
        }
        .cumple-fecha {
            background-color: var(--accent-primary);
            color: white;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            font-size: 0.7rem;
            min-width: 45px;
            text-align: center;
        }
        .cumple-hoy {
            background-color: rgba(29, 78, 216, 0.2);
            border-left: 3px solid var(--accent-primary);
            padding-left: 0.5rem;
        }
        .btn-config {
            background-color: var(--bg-surface);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-config:hover {
            background-color: var(--bg-card);
            border-color: var(--accent-primary);
        }
        .btn-config.active {
            background-color: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
        }
        .error-message {
            color: var(--accent-danger);
            text-align: center;
            padding: 2rem;
        }
        @media (max-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .config-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <nav class="navbar">
            <div class="logo"><i class="fas fa-shield-alt"></i><span>Sistema Policial</span></div>
            <div class="hamburger"><span></span><span></span><span></span></div>
            <ul class="nav-menu">
                <li><a href="dashboard.html" class="nav-link active"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="personal.html" class="nav-link"><i class="fas fa-users"></i> Personal</a></li>
                <li><a href="recargos.html" class="nav-link"><i class="fas fa-exclamation-triangle"></i> Recargos</a></li>
                <li><a href="expedientes.html" class="nav-link"><i class="fas fa-folder-open"></i> Expedientes</a></li>
                <li><a href="licencias.html" class="nav-link"><i class="fas fa-calendar-alt"></i> Licencias</a></li>
                <li><a href="usuarios.html" class="nav-link"><i class="fas fa-user-cog"></i> Usuarios</a></li>
                <li><a href="configuracion.html" class="nav-link"><i class="fas fa-cog"></i> Configuración</a></li>
            </ul>
            <div class="user-info"><span id="userInfo"></span><button id="logoutBtn" class="btn btn-sm btn-danger"><i class="fas fa-sign-out-alt"></i> Salir</button></div>
        </nav>
    </div>
    
    <div class="container">
        <div class="card-header">
            <h1><i class="fas fa-tachometer-alt"></i> Dashboard</h1>
            <div>
                <button id="btnConfigurar" class="btn-config"><i class="fas fa-cog"></i> Configurar Dashboard</button>
            </div>
        </div>
        
        <!-- Panel de Configuración -->
        <div id="configPanel" class="config-panel" style="display: none;">
            <h3><i class="fas fa-sliders-h"></i> Personalizar Dashboard</h3>
            <p class="text-secondary">Seleccione los widgets que desea mostrar</p>
            
            <div class="config-grid" id="widgetsList">
                <div class="config-item"><input type="checkbox" value="stats"> <label>📊 Estadísticas Generales</label></div>
                <div class="config-item"><input type="checkbox" value="jerarquias"> <label>📈 Distribución por Jerarquía</label></div>
                <div class="config-item"><input type="checkbox" value="recargos"> <label>⚠️ Últimos Recargos</label></div>
                <div class="config-item"><input type="checkbox" value="expedientes"> <label>📁 Expedientes Recientes</label></div>
                <div class="config-item"><input type="checkbox" value="licencias"> <label>📅 Licencias Activas</label></div>
                <div class="config-item"><input type="checkbox" value="tipos_requerimiento"> <label>🏷️ Tipos de Requerimiento</label></div>
                <div class="config-item"><input type="checkbox" value="juzgados"> <label>⚖️ Por Juzgado</label></div>
                <div class="config-item"><input type="checkbox" value="dependencias"> <label>🏢 Por Dependencia</label></div>
                <div class="config-item"><input type="checkbox" value="cumpleanos"> <label>🎂 Cumpleaños del Mes</label></div>
            </div>
            
            <div class="periodo-selector">
                <label>Período para reportes:</label>
                <select id="periodoReporte" class="form-control" style="width: auto;">
                    <option value="semanal">Última semana</option>
                    <option value="mensual">Último mes</option>
                    <option value="trimestral">Último trimestre</option>
                    <option value="anual">Último año</option>
                    <option value="personalizado">Personalizado</option>
                </select>
                <div id="fechasPersonalizadas" style="display: none;">
                    <input type="date" id="fecha_desde" class="form-control" style="width: auto; display: inline-block;">
                    <input type="date" id="fecha_hasta" class="form-control" style="width: auto; display: inline-block;">
                </div>
                <button id="btnGuardarConfig" class="btn btn-primary">Guardar Configuración</button>
                <button id="btnCerrarConfig" class="btn btn-secondary">Cerrar</button>
            </div>
        </div>
        
        <div id="dashboardWidgets" class="dashboard-grid">
            <div class="text-center">Cargando datos...</div>
        </div>
    </div>
    
    <div id="toast-container" class="toast-container"></div>
    
    <script>
        const API_URL = 'backend/api.php';
        let activeWidgets = ['stats', 'jerarquias', 'recargos', 'expedientes', 'licencias'];
        let charts = {};
        let datosGenerales = {};
        
        function showToast(message, type) {
            const container = document.getElementById('toast-container');
            if (!container) return;
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<div>${message}</div>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function getToken() {
            return localStorage.getItem('jwt_token');
        }
        
        async function apiRequest(endpoint) {
            const token = getToken();
            const headers = {};
            if (token) headers['Authorization'] = `Bearer ${token}`;
            
            try {
                const response = await fetch(`${API_URL}?endpoint=${endpoint}`, { headers });
                const text = await response.text();
                try {
                    return JSON.parse(text);
                } catch(e) {
                    console.error('Error parsing JSON:', text.substring(0, 200));
                    return null;
                }
            } catch (error) {
                console.error('API Error:', error);
                return null;
            }
        }
        
        async function cargarConfiguracion() {
            try {
                const config = await apiRequest('dashboard_config');
                if (config && Array.isArray(config) && config.length > 0) {
                    activeWidgets = config;
                }
                // Marcar checkboxes
                document.querySelectorAll('#widgetsList input').forEach(cb => {
                    cb.checked = activeWidgets.includes(cb.value);
                });
            } catch (error) {
                console.error('Error loading config:', error);
            }
        }
        
        async function guardarConfiguracion() {
            const selectedWidgets = Array.from(document.querySelectorAll('#widgetsList input:checked')).map(cb => cb.value);
            activeWidgets = selectedWidgets;
            
            try {
                const response = await fetch(`${API_URL}?endpoint=dashboard_config`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${getToken()}`
                    },
                    body: JSON.stringify({ widgets: selectedWidgets })
                });
                const result = await response.json();
                if (result.success) {
                    showToast('Configuración guardada', 'success');
                    document.getElementById('configPanel').style.display = 'none';
                    cargarDashboard();
                }
            } catch (error) {
                showToast('Error guardando configuración', 'error');
            }
        }
        
        function getFechasPeriodo() {
            const periodo = document.getElementById('periodoReporte').value;
            const hoy = new Date();
            let fechaDesde, fechaHasta;
            
            fechaHasta = hoy.toISOString().split('T')[0];
            
            switch(periodo) {
                case 'semanal':
                    fechaDesde = new Date(hoy.setDate(hoy.getDate() - 7)).toISOString().split('T')[0];
                    break;
                case 'mensual':
                    fechaDesde = new Date(hoy.setMonth(hoy.getMonth() - 1)).toISOString().split('T')[0];
                    break;
                case 'trimestral':
                    fechaDesde = new Date(hoy.setMonth(hoy.getMonth() - 3)).toISOString().split('T')[0];
                    break;
                case 'anual':
                    fechaDesde = new Date(hoy.setFullYear(hoy.getFullYear() - 1)).toISOString().split('T')[0];
                    break;
                default:
                    fechaDesde = document.getElementById('fecha_desde').value;
                    fechaHasta = document.getElementById('fecha_hasta').value;
            }
            
            return { fechaDesde, fechaHasta };
        }
        
        async function cargarDashboard() {
            const container = document.getElementById('dashboardWidgets');
            container.innerHTML = '<div class="text-center">Cargando dashboard...</div>';
            
            try {
                const dashboardData = await apiRequest('dashboard');
                if (!dashboardData) {
                    container.innerHTML = '<div class="error-message">Error cargando datos del dashboard</div>';
                    return;
                }
                
                datosGenerales = dashboardData;
                let html = '<div class="dashboard-grid">';
                let widgetIndex = 0;
                
                for (const widget of activeWidgets) {
                    switch(widget) {
                        case 'stats':
                            html += await renderStatsWidget(dashboardData, widgetIndex++);
                            break;
                        case 'jerarquias':
                            html += await renderJerarquiasWidget(dashboardData, widgetIndex++);
                            break;
                        case 'recargos':
                            html += await renderRecargosWidget(dashboardData, widgetIndex++);
                            break;
                        case 'expedientes':
                            html += await renderExpedientesWidget(dashboardData, widgetIndex++);
                            break;
                        case 'licencias':
                            html += await renderLicenciasWidget(dashboardData, widgetIndex++);
                            break;
                        case 'tipos_requerimiento':
                            html += await renderTiposRequerimientoWidget(widgetIndex++);
                            break;
                        case 'juzgados':
                            html += await renderJuzgadosWidget(widgetIndex++);
                            break;
                        case 'dependencias':
                            html += await renderDependenciasWidget(widgetIndex++);
                            break;
                        case 'cumpleanos':
                            html += await renderCumpleanosWidget(widgetIndex++);
                            break;
                    }
                }
                
                html += '</div>';
                container.innerHTML = html;
                
                // Inicializar gráficos
                for (const widget of activeWidgets) {
                    if (['tipos_requerimiento', 'juzgados', 'dependencias'].includes(widget)) {
                        await inicializarGrafico(widget);
                    }
                }
                
            } catch (error) {
                console.error('Error loading dashboard:', error);
                container.innerHTML = `<div class="error-message">Error de conexión: ${error.message}</div>`;
            }
        }
        
        async function renderStatsWidget(data, index) {
            const totalExpedientes = data.expedientes_recientes?.length || 0;
            const resueltos = data.expedientes_recientes?.filter(e => e.estado === 'Finalizado' || e.estado === 'Resuelto').length || 0;
            const tasaResolucion = totalExpedientes > 0 ? ((resueltos / totalExpedientes) * 100).toFixed(1) : 0;
            
            return `
                <div class="widget" data-widget-index="${index}">
                    <div class="widget-header">
                        <span class="widget-title"><i class="fas fa-chart-line"></i> Estadísticas Generales</span>
                        <button class="widget-remove" onclick="removerWidget(${index})" title="Eliminar widget"><i class="fas fa-times"></i></button>
                    </div>
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem;">
                        <div><div class="widget-value kpi-info">${data.total_personal || 0}</div><div class="text-secondary">Personal</div></div>
                        <div><div class="widget-value kpi-info">${data.ultimos_recargos?.length || 0}</div><div class="text-secondary">Recargos</div></div>
                        <div><div class="widget-value kpi-info">${totalExpedientes}</div><div class="text-secondary">Expedientes</div></div>
                        <div><div class="widget-value kpi-info">${data.licencias_activas?.length || 0}</div><div class="text-secondary">Licencias</div></div>
                    </div>
                    <div class="mt-2">
                        <div class="text-secondary" style="font-size: 0.75rem;">Tasa de resolución: ${tasaResolucion}%</div>
                        <div class="progress-bar"><div class="progress-fill" style="width: ${tasaResolucion}%;"></div></div>
                    </div>
                </div>
            `;
        }
        
        async function renderJerarquiasWidget(data, index) {
            if (!data.jerarquias || data.jerarquias.length === 0) {
                return `
                    <div class="widget" data-widget-index="${index}">
                        <div class="widget-header">
                            <span class="widget-title"><i class="fas fa-chart-bar"></i> Distribución por Jerarquía</span>
                            <button class="widget-remove" onclick="removerWidget(${index})"><i class="fas fa-times"></i></button>
                        </div>
                        <div class="text-center">No hay datos de jerarquías</div>
                    </div>
                `;
            }
            
            const max = Math.max(...data.jerarquias.map(j => j.cantidad), 1);
            return `
                <div class="widget" data-widget-index="${index}">
                    <div class="widget-header">
                        <span class="widget-title"><i class="fas fa-chart-bar"></i> Distribución por Jerarquía</span>
                        <button class="widget-remove" onclick="removerWidget(${index})"><i class="fas fa-times"></i></button>
                    </div>
                    <div class="bar-chart">
                        ${data.jerarquias.map(j => `
                            <div class="bar-item">
                                <div class="bar-label">
                                    <span>${escapeHtml(j.jerarquia || 'Sin especificar')}</span>
                                    <span>${j.cantidad}</span>
                                </div>
                                <div class="bar">
                                    <div class="bar-fill" style="width: ${(j.cantidad / max) * 100}%">${j.cantidad}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        
        async function renderRecargosWidget(data, index) {
            return `
                <div class="widget" data-widget-index="${index}">
                    <div class="widget-header">
                        <span class="widget-title"><i class="fas fa-exclamation-triangle"></i> Últimos Recargos</span>
                        <button class="widget-remove" onclick="removerWidget(${index})"><i class="fas fa-times"></i></button>
                    </div>
                    ${data.ultimos_recargos && data.ultimos_recargos.length > 0 ? 
                        data.ultimos_recargos.map(r => `
                            <div class="list-item">
                                <div><strong>${escapeHtml(r.fecha)}</strong> - ${escapeHtml(r.tipo_recargo || 'Sin tipo')}</div>
                                <div class="text-secondary" style="font-size: 0.75rem;">${escapeHtml(r.apellido ? `${r.apellido}, ${r.nombre}` : 'Sin asignar')}</div>
                            </div>
                        `).join('') : 
                        '<div class="text-center">No hay recargos registrados</div>'
                    }
                    <a href="recargos.html" class="btn btn-sm btn-secondary mt-2" style="width: 100%; text-align: center; display: block;">Ver todos</a>
                </div>
            `;
        }
        
        async function renderExpedientesWidget(data, index) {
            return `
                <div class="widget" data-widget-index="${index}">
                    <div class="widget-header">
                        <span class="widget-title"><i class="fas fa-folder-open"></i> Expedientes Recientes</span>
                        <button class="widget-remove" onclick="removerWidget(${index})"><i class="fas fa-times"></i></button>
                    </div>
                    ${data.expedientes_recientes && data.expedientes_recientes.length > 0 ? 
                        data.expedientes_recientes.map(e => `
                            <div class="list-item">
                                <div><strong>${escapeHtml(e.nro_expediente)}</strong> - ${escapeHtml(e.fecha)}</div>
                                <div class="text-secondary" style="font-size: 0.75rem;">${escapeHtml(e.tipo_oficio || 'Sin tipo')}</div>
                            </div>
                        `).join('') : 
                        '<div class="text-center">No hay expedientes registrados</div>'
                    }
                    <a href="expedientes.html" class="btn btn-sm btn-secondary mt-2" style="width: 100%; text-align: center; display: block;">Ver todos</a>
                </div>
            `;
        }
        
        async function renderLicenciasWidget(data, index) {
            return `
                <div class="widget" data-widget-index="${index}">
                    <div class="widget-header">
                        <span class="widget-title"><i class="fas fa-calendar-alt"></i> Licencias Activas</span>
                        <button class="widget-remove" onclick="removerWidget(${index})"><i class="fas fa-times"></i></button>
                    </div>
                    ${data.licencias_activas && data.licencias_activas.length > 0 ? 
                        data.licencias_activas.map(l => `
                            <div class="list-item">
                                <div><strong>${escapeHtml(l.apellido ? `${l.apellido}, ${l.nombre}` : 'Sin agente')}</strong></div>
                                <div class="text-secondary" style="font-size: 0.75rem;">${escapeHtml(l.tipo_licencia)} - ${escapeHtml(l.fecha_inicio)}</div>
                                <span class="badge badge-${l.estado === 'Aprobada' ? 'success' : 'warning'}">${l.estado}</span>
                            </div>
                        `).join('') : 
                        '<div class="text-center">No hay licencias activas</div>'
                    }
                    <a href="licencias.html" class="btn btn-sm btn-secondary mt-2" style="width: 100%; text-align: center; display: block;">Ver todas</a>
                </div>
            `;
        }
        
        async function renderTiposRequerimientoWidget(index) {
            const { fechaDesde, fechaHasta } = getFechasPeriodo();
            const data = await apiRequest(`dashboard_stats&tipo=tipos_requerimiento&fecha_desde=${fechaDesde}&fecha_hasta=${fechaHasta}`);
            const hasData = data && data.length > 0;
            
            return `
                <div class="widget" data-widget-index="${index}">
                    <div class="widget-header">
                        <span class="widget-title"><i class="fas fa-tags"></i> Tipos de Requerimiento</span>
                        <button class="widget-remove" onclick="removerWidget(${index})"><i class="fas fa-times"></i></button>
                    </div>
                    <canvas id="chartTiposRequerimiento" height="200"></canvas>
                    <div id="dataTiposRequerimiento" style="display:none;">${JSON.stringify(data || [])}</div>
                    ${!hasData ? '<div class="text-center">No hay datos en el período seleccionado</div>' : ''}
                </div>
            `;
        }
        
        async function renderJuzgadosWidget(index) {
            const { fechaDesde, fechaHasta } = getFechasPeriodo();
            const data = await apiRequest(`dashboard_stats&tipo=juzgados&fecha_desde=${fechaDesde}&fecha_hasta=${fechaHasta}`);
            const hasData = data && data.length > 0;
            
            return `
                <div class="widget" data-widget-index="${index}">
                    <div class="widget-header">
                        <span class="widget-title"><i class="fas fa-gavel"></i> Por Juzgado</span>
                        <button class="widget-remove" onclick="removerWidget(${index})"><i class="fas fa-times"></i></button>
                    </div>
                    <canvas id="chartJuzgados" height="200"></canvas>
                    <div id="dataJuzgados" style="display:none;">${JSON.stringify(data || [])}</div>
                    ${!hasData ? '<div class="text-center">No hay datos en el período seleccionado</div>' : ''}
                </div>
            `;
        }
        
        async function renderDependenciasWidget(index) {
            const { fechaDesde, fechaHasta } = getFechasPeriodo();
            const data = await apiRequest(`dashboard_stats&tipo=dependencias&fecha_desde=${fechaDesde}&fecha_hasta=${fechaHasta}`);
            const hasData = data && data.length > 0;
            
            return `
                <div class="widget" data-widget-index="${index}">
                    <div class="widget-header">
                        <span class="widget-title"><i class="fas fa-building"></i> Por Dependencia</span>
                        <button class="widget-remove" onclick="removerWidget(${index})"><i class="fas fa-times"></i></button>
                    </div>
                    <canvas id="chartDependencias" height="200"></canvas>
                    <div id="dataDependencias" style="display:none;">${JSON.stringify(data || [])}</div>
                    ${!hasData ? '<div class="text-center">No hay datos en el período seleccionado</div>' : ''}
                </div>
            `;
        }
        
        async function renderCumpleanosWidget(index) {
            const mesActual = new Date().getMonth() + 1;
            const data = await apiRequest(`dashboard_stats&tipo=cumpleanos&mes=${mesActual}`);
            const hoy = new Date();
            const hoyMes = hoy.getMonth() + 1;
            const hoyDia = hoy.getDate();
            
            return `
                <div class="widget" data-widget-index="${index}">
                    <div class="widget-header">
                        <span class="widget-title"><i class="fas fa-birthday-cake"></i> Cumpleaños del Mes</span>
                        <button class="widget-remove" onclick="removerWidget(${index})"><i class="fas fa-times"></i></button>
                    </div>
                    ${data && data.length > 0 ? 
                        data.map(p => {
                            const dia = p.fecha_nacimiento ? parseInt(p.fecha_nacimiento.split('-')[2]) : 0;
                            const esHoy = (hoyMes === mesActual && hoyDia === dia);
                            return `
                                <div class="cumple-item ${esHoy ? 'cumple-hoy' : ''}">
                                    <div class="cumple-fecha">${dia}</div>
                                    <div><strong>${escapeHtml(p.apellido)}, ${escapeHtml(p.nombre)}</strong><br><small>Legajo: ${p.legajo}</small></div>
                                    ${esHoy ? '<i class="fas fa-gift" style="color: var(--accent-primary);"></i>' : ''}
                                </div>
                            `;
                        }).join('') : 
                        '<div class="text-center">No hay cumpleaños este mes</div>'
                    }
                </div>
            `;
        }
        
        async function inicializarGrafico(tipo) {
            const canvasId = tipo === 'tipos_requerimiento' ? 'chartTiposRequerimiento' : (tipo === 'juzgados' ? 'chartJuzgados' : 'chartDependencias');
            const dataDiv = document.getElementById(`data${tipo.charAt(0).toUpperCase() + tipo.slice(1)}`);
            
            if (!dataDiv) return;
            
            try {
                const data = JSON.parse(dataDiv.innerHTML);
                if (data && data.length > 0) {
                    const ctx = document.getElementById(canvasId)?.getContext('2d');
                    if (ctx) {
                        if (charts[tipo]) charts[tipo].destroy();
                        charts[tipo] = new Chart(ctx, {
                            type: 'bar',
                            data: {
                                labels: data.map(d => d.nombre || 'Sin especificar'),
                                datasets: [{
                                    label: 'Cantidad',
                                    data: data.map(d => d.cantidad),
                                    backgroundColor: 'rgba(29, 78, 216, 0.6)',
                                    borderColor: 'rgba(29, 78, 216, 1)',
                                    borderWidth: 1
                                }]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: true,
                                scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
                            }
                        });
                    }
                }
            } catch(e) {
                console.error('Error inicializando gráfico:', e);
            }
        }
        
        function removerWidget(index) {
            const widget = document.querySelector(`.widget[data-widget-index="${index}"]`);
            if (widget) {
                widget.remove();
                showToast('Widget eliminado. Guarde la configuración para que el cambio sea permanente.', 'info');
            }
        }
        
        document.getElementById('btnConfigurar')?.addEventListener('click', () => {
            document.getElementById('configPanel').style.display = 'block';
            cargarConfiguracion();
        });
        
        document.getElementById('btnCerrarConfig')?.addEventListener('click', () => {
            document.getElementById('configPanel').style.display = 'none';
        });
        
        document.getElementById('btnGuardarConfig')?.addEventListener('click', guardarConfiguracion);
        
        document.getElementById('periodoReporte')?.addEventListener('change', function() {
            const personalizado = document.getElementById('fechasPersonalizadas');
            personalizado.style.display = this.value === 'personalizado' ? 'block' : 'none';
        });
        
        function checkAuth() {
            const user = localStorage.getItem('current_user');
            if (!user) {
                window.location.href = 'index.html';
                return false;
            }
            const userData = JSON.parse(user);
            const userInfoEl = document.getElementById('userInfo');
            if (userInfoEl) {
                userInfoEl.innerHTML = `<span>${escapeHtml(userData.nombre)}</span><span class="badge badge-info">${escapeHtml(userData.rol)}</span>`;
            }
            return true;
        }
        
        function handleLogout() {
            localStorage.removeItem('current_user');
            localStorage.removeItem('jwt_token');
            window.location.href = 'index.html';
        }
        
        function toggleMobileMenu() {
            document.querySelector('.nav-menu')?.classList.toggle('active');
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            if (checkAuth()) {
                cargarConfiguracion();
                cargarDashboard();
            }
            document.getElementById('logoutBtn')?.addEventListener('click', handleLogout);
            document.querySelector('.hamburger')?.addEventListener('click', toggleMobileMenu);
        });
        
        window.removerWidget = removerWidget;
    </script>
</body>
</html>
